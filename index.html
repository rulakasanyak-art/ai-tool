<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>FastTools AI Hub</title>

<meta name="description" content="50 free AI tools in one place">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(0,0,0,0.3);
}

.logo{
font-size:22px;
font-weight:bold;
}

.search{
padding:10px;
border-radius:10px;
border:none;
}

.tools{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:40px;
max-width:1200px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:12px;
cursor:pointer;
text-align:center;
transition:0.3s;
}

.card:hover{
background:rgba(255,255,255,0.2);
transform:scale(1.05);
}

.toolBox{
display:none;
max-width:700px;
margin:40px auto;
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:15px;
}

textarea{
width:100%;
height:120px;
border-radius:10px;
border:none;
padding:10px;
}

button{
margin-top:10px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#00c6ff;
color:white;
cursor:pointer;
}

#result{
margin-top:15px;
background:rgba(0,0,0,0.4);
padding:15px;
border-radius:10px;
}

</style>

</head>

<body>

<header>

<div class="logo">FastTools AI</div>

<input class="search" id="search" placeholder="Search AI tool...">

</header>

<h1 style="text-align:center;margin-top:40px">
50 AI Tools
</h1>

<div class="tools" id="tools"></div>

<div class="toolBox" id="toolBox">

<h2 id="toolTitle"></h2>

<textarea id="input" placeholder="Write your request..."></textarea>

<br>

<button onclick="generate()">Generate</button>

<div id="result"></div>

</div>

<script>

const tools = [

"AI Chat",
"Text Generator",
"Email Writer",
"Business Ideas",
"Brand Name Generator",
"Story Generator",
"Product Description",
"Instagram Caption",
"YouTube Title Generator",
"Marketing Ideas",
"Startup Ideas",
"Domain Name Generator",
"Slogan Generator",
"Ad Copy Generator",
"Tweet Generator",
"Blog Title Generator",
"Resume Generator",
"Cover Letter Generator",
"Essay Generator",
"Paragraph Generator",
"AI Translator",
"Grammar Fixer",
"AI Summarizer",
"Article Generator",
"Script Generator",
"Podcast Ideas",
"Book Ideas",
"Character Generator",
"Startup Name Generator",
"AI Coach",
"Workout Plan Generator",
"Diet Plan Generator",
"Travel Ideas",
"Study Plan",
"Learning Plan",
"Motivation Generator",
"Quote Generator",
"AI Planner",
"Goal Generator",
"AI Mentor",
"Product Name Generator",
"Company Name Generator",
"Logo Idea Generator",
"Content Ideas",
"AI Research Tool",
"AI Problem Solver",
"AI Tutor",
"AI Brainstorm",
"AI Note Generator",
"AI Productivity Tool"

];

const toolsContainer = document.getElementById("tools");

function renderTools(list){

toolsContainer.innerHTML="";

list.forEach(tool=>{

let div=document.createElement("div");

div.className="card";

div.innerText=tool;

div.onclick=()=>openTool(tool);

toolsContainer.appendChild(div);

});

}

renderTools(tools);

function openTool(name){

document.getElementById("toolBox").style.display="block";

document.getElementById("toolTitle").innerText=name;

document.getElementById("result").innerHTML="";

window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});

}

function generate(){

let text=document.getElementById("input").value;

if(text==""){
document.getElementById("result").innerHTML="Write something first.";
return;
}

document.getElementById("result").innerHTML=
"AI response:<br><br>"+text;

}

document.getElementById("search").addEventListener("input",function(){

let value=this.value.toLowerCase();

let filtered=tools.filter(tool=>tool.toLowerCase().includes(value));

renderTools(filtered);

});

</script>

</body>
</html>
