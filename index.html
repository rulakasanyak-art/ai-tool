<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FastTools AI Generator</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
color:white;
}

.container{
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:15px;
width:90%;
max-width:500px;
text-align:center;
backdrop-filter:blur(10px);
}

h1{
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
border-radius:10px;
border:none;
padding:10px;
font-size:16px;
}

button{
margin-top:15px;
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
background:#00c6ff;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0072ff;
}

#result{
margin-top:20px;
background:rgba(0,0,0,0.3);
padding:15px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>FastTools AI Generator</h1>

<textarea id="input" placeholder="Write something..."></textarea>

<br>

<button onclick="generate()">Generate</button>

<div id="result"></div>

</div>

<script>

function generate(){

let text=document.getElementById("input").value;

if(text==""){
document.getElementById("result").innerHTML="Please write something first.";
return;
}

document.getElementById("result").innerHTML=
"AI generated text:<br><br>"+text;

}

</script>

</body>
</html>
